name: Actualizar Análisis.com cada 24h

# Corre todos los días a las 09:00 UTC (06:00 en Chile/Argentina).
# Ajusta el cron a tu zona horaria. También se puede lanzar a mano.
on:
  push:
    branches: [main]        # publica al subir cambios (el primer push despliega)
  schedule:
    - cron: "0 9 * * *"     # y cada día a las 09:00 UTC (06:00 en Chile/Argentina)
  workflow_dispatch:         # o manualmente desde la pestaña Actions

# Evita corridas solapadas
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write   # para hacer commit del nuevo articles.json
  pages: write      # para publicar en GitHub Pages
  id-token: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    # deploy-pages@v4 exige que el job apunte al entorno github-pages.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install feedparser openai anthropic requests google-analytics-data

      - name: Ejecutar pipeline editorial (recolectar + redactar + guardar)
        # Solo genera en el cron diario y en ejecuciones manuales, NO en cada push
        # de código (así un commit no dispara la redacción de decenas de notas).
        if: ${{ github.event_name != 'push' }}
        env:
          # Guarda tus claves en: Settings > Secrets and variables > Actions
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIPELINE_MODEL: ${{ vars.PIPELINE_MODEL }}       # opcional: p.ej. claude-sonnet-5 (más barato)
          PIPELINE_LIMIT: ${{ vars.PIPELINE_LIMIT }}       # prueba: nº máx. de notas por corrida (0 = sin límite)
          PIPELINE_DRY_RUN: ${{ vars.PIPELINE_DRY_RUN }}   # prueba: "1" = generar y mostrar sin publicar
        run: python3 generator/pipeline.py || echo "Pipeline omitido (se conserva el contenido actual)"

      - name: Actualizar datos regionales (tablero)
        run: python3 generator/fetch_data.py || echo "Datos - se conserva el ultimo valor"

      - name: Analítica de visitas (GA4 -> panel privado)
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}   # id numérico de la propiedad GA4
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}   # JSON de la cuenta de servicio
        run: python3 generator/analytics.py || echo "Analítica omitida (panel sin datos)"

      - name: (Opcional) Traducir a PT/EN
        env:
          # translate.py se auto-desactiva si falta la clave (no se puede usar el
          # contexto 'secrets' dentro de un 'if:', rompe la validación del workflow).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 generator/translate.py || echo "Traducción omitida"

      - name: Generar sitio estático (portadas OpenAI + todas las funciones)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}   # fotos reales con licencia libre
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_QUALITY: medium          # low | medium | high
          IMAGE_SIZE: 1536x1024
          AUDIO_TTS: ${{ vars.AUDIO_TTS }}   # "1" para generar voz neuronal por nota (necesita OPENAI_API_KEY)
          TTS_VOICE: ${{ vars.TTS_VOICE }}   # opcional: nova, alloy, shimmer, ...
          SITE_URL: https://www.analisis.com
          ANALYTICS_DOMAIN: ${{ vars.ANALYTICS_DOMAIN }}   # p.ej. analisis.com (Plausible)
          GA4_ID: ${{ vars.GA4_ID }}                        # id de medición GA4 (G-XXXX) para el tracking
          ASK_URL: ${{ vars.ASK_URL }}                      # endpoint /api/ask del asistente IA (T15)
          PANEL_PASSWORD: ${{ secrets.PANEL_PASSWORD }}     # clave del panel privado /panel.html
          ADS: ${{ vars.ADS }}                              # "1" para mostrar slots de anuncios
        run: python3 generator/build.py

      - name: Distribuir titulares (Telegram / WhatsApp / email)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          SITE_URL: https://www.analisis.com
        run: python3 generator/distribute.py || echo "Distribución omitida"

      - name: Guardar nuevas publicaciones en el repo (archivo histórico)
        run: |
          git config user.name "Análisis Bot"
          git config user.email "bot@analisis.com"
          git add content/articles.json content/covers content/audio content/data.json content/analytics.json content/digest.json content/articles.*.json 2>/dev/null || git add content/articles.json content/covers content/data.json
          git commit -m "Actualización automática $(date -u +%Y-%m-%d)" || echo "Sin cambios que guardar"
          git push || echo "Nada que empujar"

      - name: Preparar artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
